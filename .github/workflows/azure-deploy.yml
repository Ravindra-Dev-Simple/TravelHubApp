name: CI/CD - Docker to Azure Web App

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: travelapi
  WEBAPP_NAME: TravelHubApp
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          docker login "${{ env.ACR_LOGIN_SERVER }}" \
            -u "${{ env.ACR_USERNAME }}" \
            -p "${{ env.ACR_PASSWORD }}"

      - name: Build image
        run: |
          docker build \
            -t "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            -t "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest" \
            .

      - name: Push image
        run: |
          docker push "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker push "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

      - name: Configure web app container and restart
        uses: azure/CLI@v2
        with:
          inlineScript: |
            RG="${{ env.RESOURCE_GROUP }}"
            if [ -z "$RG" ]; then
              RG="$(az webapp list --query "[?name=='${{ env.WEBAPP_NAME }}'].resourceGroup | [0]" -o tsv)"
            fi

            if [ -z "$RG" ]; then
              echo "Unable to resolve resource group for app '${{ env.WEBAPP_NAME }}'."
              echo "Set AZURE_RESOURCE_GROUP secret, or ensure app name is correct and unique."
              exit 1
            fi

            az webapp config container set \
              --name "${{ env.WEBAPP_NAME }}" \
              --resource-group "$RG" \
              --container-image-name "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
              --container-registry-url "https://${{ env.ACR_LOGIN_SERVER }}" \
              --container-registry-user "${{ env.ACR_USERNAME }}" \
              --container-registry-password "${{ env.ACR_PASSWORD }}"

            az webapp restart \
              --name "${{ env.WEBAPP_NAME }}" \
              --resource-group "$RG"
